<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <title>Spoznaj AI · Pomočnik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-brand: #00334a;
      --color-brand-600: #002a3d;
      --color-accent: #afd037;
      --color-paper: #ffffff;
      --color-paper-soft: #fafaf8;
      --color-ink: #0a0e12;
      --color-ink-700: #1a2128;
      --color-ink-500: #4a5560;
      --color-ink-400: #6b7682;
      --color-ink-300: #9aa3ad;
      --color-ink-200: #d4d8dc;
      --color-ink-50: #f5f5f3;
      --hairline: rgba(10,14,18,0.08);
      --radius: 16px;
      --shadow-card: 0 1px 0 rgba(10,14,18,0.04), 0 24px 48px -24px rgba(10,14,18,0.18);
      --shadow-hover: 0 1px 0 rgba(10,14,18,0.04), 0 50px 80px -30px rgba(0,51,74,0.30);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      --app-vh: 100vh;
    }

    body {
      margin: 0; padding: 0;
      color: var(--color-ink);
      background: var(--color-paper);
      background-image:
        radial-gradient(55% 55% at 82% 18%, rgba(175,208,55,0.18), transparent 70%),
        radial-gradient(50% 60% at 18% 28%, rgba(0,77,110,0.12), transparent 70%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 24px; }

    .chat-card {
      background: var(--color-paper-soft);
      border: 1px solid var(--hairline);
      border-radius: 24px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 820px;
      transition: box-shadow 0.4s ease;
    }
    .chat-card:hover { box-shadow: var(--shadow-hover); }

    .chat-header {
      background: var(--color-paper);
      color: var(--color-ink);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--hairline);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .header-icon {
      width: 44px; height: 44px;
      background: var(--color-brand);
      color: #fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .header-info h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.55rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--color-ink);
    }
    .header-info p {
      font-size: 0.82rem;
      color: var(--color-ink-400);
      margin-top: 2px;
    }

    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--color-ink-50);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      color: var(--color-ink-500);
      border: 1px solid var(--hairline);
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--color-accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .new-session-btn {
      background: transparent;
      border: 1px solid var(--hairline);
      color: var(--color-ink-500);
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
      font-family: inherit;
    }
    .new-session-btn:hover {
      background: var(--color-ink-50);
      color: var(--color-brand);
      border-color: var(--color-brand);
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--color-paper-soft);
    }

    .messages-container::-webkit-scrollbar { width: 6px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--color-ink-200); border-radius: 4px; }

    .message { display: flex; align-items: flex-start; gap: 10px; animation: messageSlide 0.3s ease; }
    @keyframes messageSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      letter-spacing: 0.4px;
    }
    .message.bot .message-avatar { background: var(--color-brand); color: #fff; }
    .message.user .message-avatar { background: var(--color-ink-50); color: var(--color-ink-500); border: 1px solid var(--hairline); }

    .message-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.95rem;
      word-wrap: break-word;
    }
    .message.bot .message-bubble {
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-bottom-left-radius: 4px;
      color: var(--color-ink-700);
    }
    .message.user .message-bubble {
      background: var(--color-brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      max-width: fit-content;
    }
    .typing-dot { width: 6px; height: 6px; background: var(--color-ink-300); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 14px 22px 18px;
      background: var(--color-paper);
      border-top: 1px solid var(--hairline);
    }

    .quick-actions { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }

    .quick-chip {
      padding: 6px 14px;
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--color-ink-500);
      font-weight: 500;
      font-family: inherit;
    }
    .quick-chip:hover {
      background: var(--color-brand);
      color: #fff;
      border-color: var(--color-brand);
      transform: translateY(-1px);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--color-paper-soft);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 6px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px rgba(0,51,74,0.08);
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 38px;
      max-height: 200px;
      outline: none;
      color: var(--color-ink);
      line-height: 1.5;
    }
    .input-field::placeholder { color: var(--color-ink-400); }

    .send-button {
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
      font-family: inherit;
      position: relative;
    }
    .send-button:hover:not(:disabled) {
      background: var(--color-brand-600);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -8px rgba(0,51,74,0.45);
    }
    .send-button:disabled { opacity: 0.45; cursor: not-allowed; }

    .send-button .accent-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--color-accent);
    }

    .input-hint {
      font-size: 0.74rem;
      color: var(--color-ink-400);
      margin-top: 10px;
      text-align: center;
    }

    .welcome-message {
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 22px;
      margin: 4px 0;
    }
    .welcome-message .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-ink-400);
      margin-bottom: 10px;
    }
    .welcome-message .eyebrow::before {
      content: "";
      width: 6px; height: 6px;
      background: var(--color-accent);
      border-radius: 50%;
    }
    .welcome-message h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      color: var(--color-ink);
      font-size: 1.5rem;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    .welcome-message h3 em {
      color: var(--color-brand);
      font-style: italic;
    }
    .welcome-message p { color: var(--color-ink-500); font-size: 0.95rem; line-height: 1.6; }

    .brand-footer {
      padding: 10px 24px 14px;
      background: var(--color-paper);
      border-top: 1px solid var(--hairline);
      text-align: center;
      font-size: 0.72rem;
      color: var(--color-ink-400);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .brand-footer strong {
      color: var(--color-brand);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      body { align-items: stretch; justify-content: flex-start; overflow: hidden; }
      .container { padding: 0; min-height: var(--app-vh); }
      .chat-card { border-radius: 0; border: none; height: var(--app-vh); max-height: var(--app-vh); overflow: hidden; }
      .chat-header { padding: calc(10px + env(safe-area-inset-top)) 14px 12px; position: sticky; top: 0; z-index: 30; }
      .header-icon { width: 36px; height: 36px; font-size: 12px; border-radius: 10px; }
      .header-info h1 { font-size: 1.15rem; }
      .header-info p { font-size: 0.72rem; }
      .new-session-btn { padding: 5px 10px; font-size: 0.74rem; }
      .status-badge { padding: 4px 9px; font-size: 0.7rem; }
      .messages-container { padding: 14px; min-height: 0; overflow-y: auto; padding-bottom: 170px; }
      .message-bubble { max-width: 86%; }
      .input-area { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -8px 20px rgba(10,14,18,0.06); }
      .quick-actions { display: none !important; }
      .input-field { min-height: 38px; max-height: 96px; }
      .send-button { padding: 9px 14px; font-size: 0.88rem; }
      .input-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="chat-card">
      <div class="chat-header">
        <div class="header-left">
          <div class="header-icon">AI</div>
          <div class="header-info">
            <h1>Spoznaj AI</h1>
            <p>Virtualni pomočnik · 10+ jezikov</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="new-session-btn" id="newSessionBtn">Nov pogovor</button>
          <div class="status-badge">
            <div class="status-dot"></div>
            <span>v živo</span>
          </div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="input-area">
        <div class="quick-actions">
          <div class="quick-chip" data-prompt="Koliko stane virtualni pomočnik?">Cenik</div>
          <div class="quick-chip" data-prompt="Kako deluje virtualni pomočnik?">Kako deluje</div>
          <div class="quick-chip" data-prompt="Kako poteka postavitev?">Postavitev</div>
          <div class="quick-chip" data-prompt="Za katere panoge je primeren?">Primeri</div>
          <div class="quick-chip" data-prompt="V katerih jezikih odgovarja?">Jeziki</div>
          <div class="quick-chip" data-prompt="Kako vas kontaktiram?">Kontakt</div>
        </div>
        <div class="input-wrapper">
          <textarea
            class="input-field"
            id="messageInput"
            rows="1"
            placeholder="Vprašajte karkoli o naših pomočnikih..."></textarea>
          <button class="send-button" id="sendButton">
            <span class="accent-dot"></span>
            <span>Pošlji</span>
          </button>
        </div>
        <div class="input-hint">Enter = pošlji &nbsp;•&nbsp; Shift+Enter = nova vrstica</div>
      </div>

      <div class="brand-footer">
        <strong>Spoznaj AI</strong>
      </div>
    </div>
  </div>

  <script>
    function setAppVh() {
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-vh', `${Math.round(vh)}px`);
    }
    setAppVh();
    window.addEventListener('resize', setAppVh);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setAppVh);

    const apiUrl = "/chat/";
    const sessionKey = "spoznajai_session_id";

    let sessionId = localStorage.getItem(sessionKey);
    if (!sessionId) {
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionKey, sessionId);
    }

    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const newSessionBtn = document.getElementById('newSessionBtn');

    messageInput.addEventListener('focus', () => {
      setTimeout(() => messageInput.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 120);
    });

    function formatMessage(text) {
      text = text.replace(/\n/g, '<br>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      return text;
    }

    function addMessage(text, type = 'bot') {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = type === 'bot' ? 'AI' : 'Vi';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = formatMessage(text);

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;

      div.appendChild(avatar);
      div.appendChild(indicator);
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessageWithText(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      addMessage(trimmed, 'user');
      messageInput.value = '';
      messageInput.focus();
      sendButton.disabled = true;
      showTypingIndicator();

      try {
        const response = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: trimmed, session_id: sessionId })
        });

        hideTypingIndicator();

        if (!response.ok) {
          addMessage('Prišlo je do napake. Poskusite znova ali nas kontaktirajte na info@spoznaj-ai.si.', 'bot');
          return;
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        avatar.textContent = 'AI';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        messageDiv.appendChild(avatar);
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          fullText += decoder.decode(value, { stream: true });
          bubble.innerHTML = formatMessage(fullText);
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        if (!fullText.trim()) {
          bubble.textContent = 'Ni odgovora.';
        }

      } catch (err) {
        hideTypingIndicator();
        addMessage('Napaka pri povezavi s strežnikom. Preverite internetno povezavo.', 'bot');
      } finally {
        sendButton.disabled = false;
      }
    }

    function sendMessage() {
      sendMessageWithText(messageInput.value);
    }

    function showWelcome() {
      messagesContainer.innerHTML = `
        <div class="welcome-message">
          <span class="eyebrow">Spoznaj AI · pomočnik</span>
          <h3>Dobrodošli na <em>Spoznaj AI</em></h3>
          <p>
            Sem virtualni pomočnik in z veseljem odgovorim na vsa vaša vprašanja
            o naših storitvah. Vprašajte me karkoli o ceniku, postavitvi, paketih
            ali načinu delovanja.
          </p>
          <p style="margin-top:14px;font-size:0.86rem;color:var(--color-ink-400);">
            Izberite hitro akcijo spodaj ali napišite vprašanje.
          </p>
        </div>
      `;
    }

    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.querySelectorAll('.quick-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        messageInput.value = chip.getAttribute('data-prompt');
        messageInput.focus();
      });
    });

    newSessionBtn.addEventListener('click', () => {
      localStorage.removeItem(sessionKey);
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionKey, sessionId);
      showWelcome();
    });

    showWelcome();
  </script>
</body>
</html>
