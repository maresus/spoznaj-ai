<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <title>SpoznajAI – Asistent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #00334a;
      --primary-dark: #001f2d;
      --primary-light: #004d6e;
      --accent: #afd037;
      --accent-glow: rgba(175, 208, 55, 0.3);
      --bg-gradient: linear-gradient(135deg, #001f2d 0%, #00334a 100%);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --bg-card: #00334a;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 25px 70px rgba(175, 208, 55, 0.15);
      --border: rgba(255, 255, 255, 0.1);
      --user-msg: linear-gradient(135deg, #afd037 0%, #c4e840 100%);
      --bot-msg: rgba(255, 255, 255, 0.05);
      --radius: 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      --app-vh: 100vh;
    }

    body {
      margin: 0; padding: 0;
      background: var(--bg-gradient);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 20px; }

    .chat-card {
      background: var(--bg-card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
      transition: box-shadow 0.3s ease;
    }
    .chat-card:hover { box-shadow: var(--shadow-hover); }

    .chat-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
      color: white;
      padding: 24px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-icon {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .header-info h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .header-info p { font-size: 0.9rem; opacity: 0.9; }

    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .new-session-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .new-session-btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-1px); }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--primary-dark);
    }

    .messages-container::-webkit-scrollbar { width: 6px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .message { display: flex; align-items: flex-start; gap: 12px; animation: messageSlide 0.3s ease; }
    @keyframes messageSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .message.bot .message-avatar { background: var(--accent); color: var(--primary-dark); }
    .message.user .message-avatar { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.95rem;
      word-wrap: break-word;
    }
    .message.bot .message-bubble { background: var(--bot-msg); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: rgba(255,255,255,0.9); }
    .message.user .message-bubble { background: var(--accent); color: var(--primary-dark); font-weight: 500; border-bottom-right-radius: 4px; }

    .typing-indicator {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      max-width: fit-content;
    }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    .input-area { padding: 16px 24px; background: var(--primary); border-top: 1px solid var(--border); }

    .quick-actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

    .quick-chip {
      padding: 6px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
      font-family: inherit;
    }
    .quick-chip:hover {
      background: var(--accent);
      color: var(--primary-dark);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }

    .input-field {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 50px;
      max-height: 200px;
      transition: all 0.2s;
      outline: none;
      color: white;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.35); }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(175,208,55,0.15); }

    .send-button {
      background: var(--accent);
      color: var(--primary-dark);
      border: none;
      border-radius: var(--radius);
      padding: 14px 24px;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .send-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(175,208,55,0.45); }
    .send-button:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-hint { font-size: 0.78rem; color: rgba(255,255,255,0.3); margin-top: 8px; text-align: center; }

    .welcome-message {
      background: rgba(175,208,55,0.07);
      border: 1px solid rgba(175,208,55,0.25);
      border-radius: var(--radius);
      padding: 20px;
      margin: 8px 0;
    }
    .welcome-message h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.05rem; }
    .welcome-message p { color: white; }
    .welcome-message ul { list-style: none; padding-left: 0; }
    .welcome-message li { padding: 6px 0; color: white; font-size: 0.93rem; }
    .welcome-message li:before { content: "— "; color: var(--accent); font-weight: bold; }

    @media (max-width: 768px) {
      body { align-items: stretch; justify-content: flex-start; overflow: hidden; }
      .container { padding: 0; min-height: var(--app-vh); }
      .chat-card { border-radius: 0; height: var(--app-vh); max-height: var(--app-vh); overflow: hidden; }
      .chat-header { padding: calc(8px + env(safe-area-inset-top)) 14px 10px; position: sticky; top: 0; z-index: 30; }
      .header-icon { width: 38px; height: 38px; font-size: 19px; border-radius: 10px; }
      .header-info h1 { font-size: 1.02rem; }
      .header-info p { font-size: 0.74rem; }
      .new-session-btn { padding: 6px 10px; font-size: 0.75rem; }
      .status-badge { padding: 5px 9px; font-size: 0.72rem; }
      .messages-container { padding: 12px; min-height: 0; overflow-y: auto; padding-bottom: 170px; }
      .message-bubble { max-width: 85%; }
      .input-area { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -8px 20px rgba(0,0,0,0.08); border-top: 1px solid var(--border); }
      .quick-actions { display: none !important; }
      .input-field { min-height: 44px; max-height: 96px; padding: 10px 12px; }
      .send-button { padding: 12px 14px; font-size: 0.88rem; }
      .input-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="chat-card">
      <div class="chat-header">
        <div class="header-left">
          <div class="header-icon">AI</div>
          <div class="header-info">
            <h1>SpoznajAI</h1>
            <p>Asistent za informacije o storitvah</p>
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <button class="new-session-btn" id="newSessionBtn">Nova seja</button>
          <div class="status-badge">
            <div class="status-dot"></div>
            <span>Na voljo 24/7</span>
          </div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer"></div>

      <div class="input-area">
        <div class="quick-actions">
          <div class="quick-chip" data-prompt="Koliko stane chatbot?">Cene</div>
          <div class="quick-chip" data-prompt="Kaj je vključeno v paketih?">Paketi</div>
          <div class="quick-chip" data-prompt="Kako poteka postopek postavitve?">Postopek</div>
          <div class="quick-chip" data-prompt="Katera so pogosta vprašanja?">FAQ</div>
          <div class="quick-chip" data-prompt="Ali podpira slovenščino in narečja?">Jeziki</div>
          <div class="quick-chip" data-prompt="Kako vas kontaktiram?">Kontakt</div>
        </div>
        <div class="input-wrapper">
          <textarea
            class="input-field"
            id="messageInput"
            rows="1"
            placeholder="Vprašajte karkoli o naših storitvah..."></textarea>
          <button class="send-button" id="sendButton">
            <span>Pošlji</span>
            <span>→</span>
          </button>
        </div>
        <div class="input-hint">Enter = pošlji &nbsp;•&nbsp; Shift+Enter = nova vrstica</div>
      </div>
    </div>
  </div>

  <script>
    function setAppVh() {
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-vh', `${Math.round(vh)}px`);
    }
    setAppVh();
    window.addEventListener('resize', setAppVh);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', setAppVh);

    const apiUrl = "/chat/";
    const sessionKey = "spoznajai_session_id";

    let sessionId = localStorage.getItem(sessionKey);
    if (!sessionId) {
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionKey, sessionId);
    }

    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const newSessionBtn = document.getElementById('newSessionBtn');

    messageInput.addEventListener('focus', () => {
      setTimeout(() => messageInput.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 120);
    });

    function formatMessage(text) {
      text = text.replace(/\n/g, '<br>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      return text;
    }

    function addMessage(text, type = 'bot') {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = type === 'bot' ? 'AI' : 'Vi';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = formatMessage(text);

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;

      div.appendChild(avatar);
      div.appendChild(indicator);
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function hideTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessageWithText(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      addMessage(trimmed, 'user');
      messageInput.value = '';
      messageInput.focus();
      sendButton.disabled = true;
      showTypingIndicator();

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: trimmed, session_id: sessionId })
        });

        hideTypingIndicator();

        if (!response.ok) {
          addMessage('Prišlo je do napake. Poskusite znova ali nas kontaktirajte na info@spoznaj-ai.si.', 'bot');
        } else {
          const data = await response.json();
          addMessage(data.reply || 'Ni odgovora.', 'bot');
        }
      } catch (err) {
        hideTypingIndicator();
        addMessage('Napaka pri povezavi s strežnikom. Preverite internetno povezavo.', 'bot');
      } finally {
        sendButton.disabled = false;
      }
    }

    function sendMessage() {
      sendMessageWithText(messageInput.value);
    }

    function showWelcome() {
      messagesContainer.innerHTML = `
        <div class="welcome-message">
          <h3>Pozdravljeni pri SpoznajAI</h3>
          <p style="margin-bottom:12px;">Sem vaš AI asistent. Pomagam vam z informacijami o:</p>
          <ul>
            <li>Paketih in cenah naših storitev</li>
            <li>Kako deluje AI virtualni asistent</li>
            <li>Času postavitve in tehničnih podrobnostih</li>
            <li>Kontaktu in brezplačni konzultaciji</li>
          </ul>
          <p style="margin-top:12px;font-size:0.9rem;color:var(--text-muted);">
            Kliknite hitro akcijo spodaj ali preprosto napišite vprašanje.
          </p>
        </div>
      `;
    }

    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.querySelectorAll('.quick-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        messageInput.value = chip.getAttribute('data-prompt');
        messageInput.focus();
      });
    });

    newSessionBtn.addEventListener('click', () => {
      localStorage.removeItem(sessionKey);
      sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      localStorage.setItem(sessionKey, sessionId);
      showWelcome();
    });

    showWelcome();
  </script>
</body>
</html>
