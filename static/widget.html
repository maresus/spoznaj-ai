<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-brand: #00334a;
      --color-brand-600: #002a3d;
      --color-accent: #afd037;
      --color-paper: #ffffff;
      --color-paper-soft: #fafaf8;
      --color-ink: #0a0e12;
      --color-ink-700: #1a2128;
      --color-ink-500: #4a5560;
      --color-ink-400: #6b7682;
      --color-ink-300: #9aa3ad;
      --color-ink-200: #d4d8dc;
      --color-ink-50: #f5f5f3;
      --hairline: rgba(10,14,18,0.08);
      --radius: 12px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: var(--color-paper-soft);
      color: var(--color-ink);
    }

    .chat-header {
      background: var(--color-paper);
      color: var(--color-ink);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--hairline);
    }

    .header-icon {
      font-size: 11px; font-weight: 700;
      width: 32px; height: 32px;
      background: var(--color-brand);
      color: #fff;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      letter-spacing: 0.3px;
    }

    .header-info h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--color-ink);
      line-height: 1.15;
    }
    .header-info p {
      font-size: 0.72rem;
      color: var(--color-ink-400);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--color-accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
      margin-left: auto;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--color-paper-soft);
    }

    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--color-ink-200); border-radius: 4px; }

    .message { display: flex; align-items: flex-end; gap: 8px; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .message.user { flex-direction: row-reverse; }

    .message-avatar {
      width: 24px; height: 24px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .message.bot .message-avatar { background: var(--color-brand); color: #fff; }
    .message.user .message-avatar { background: var(--color-ink-50); color: var(--color-ink-500); border: 1px solid var(--hairline); }

    .message-bubble {
      max-width: 78%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .message.bot .message-bubble {
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-bottom-left-radius: 3px;
      color: var(--color-ink-700);
    }
    .message.user .message-bubble {
      background: var(--color-brand);
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .typing-indicator {
      padding: 9px 12px;
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      display: flex; align-items: center; gap: 4px;
      max-width: fit-content;
    }
    .typing-dot { width: 5px; height: 5px; background: var(--color-ink-300); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

    .input-area {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--hairline);
      background: var(--color-paper);
      flex-shrink: 0;
    }

    .quick-actions { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .quick-chip {
      padding: 4px 10px;
      background: var(--color-paper-soft);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      font-size: 0.74rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--color-ink-500);
      font-family: inherit;
    }
    .quick-chip:hover {
      background: var(--color-brand);
      color: #fff;
      border-color: var(--color-brand);
    }

    .input-wrapper {
      display: flex;
      gap: 6px;
      align-items: center;
      background: var(--color-paper-soft);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 4px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--color-brand);
      box-shadow: 0 0 0 3px rgba(0,51,74,0.08);
    }

    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 0.875rem;
      resize: none;
      min-height: 32px;
      max-height: 100px;
      outline: none;
      line-height: 1.4;
      color: var(--color-ink);
    }
    .input-field::placeholder { color: var(--color-ink-400); }

    .send-btn {
      background: var(--color-brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--color-brand-600);
      box-shadow: 0 6px 14px -6px rgba(0,51,74,0.45);
    }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .welcome-box {
      background: var(--color-paper);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.85rem;
    }
    .welcome-box .eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-ink-400);
      margin-bottom: 8px;
    }
    .welcome-box .eyebrow::before {
      content: "";
      width: 5px; height: 5px;
      background: var(--color-accent);
      border-radius: 50%;
    }
    .welcome-box h3 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-weight: 400;
      color: var(--color-ink);
      font-size: 1.1rem;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .welcome-box h3 em { color: var(--color-brand); font-style: italic; }
    .welcome-box p { color: var(--color-ink-500); font-size: 0.82rem; line-height: 1.55; margin-top: 6px; }

    .brand-footer {
      padding: 8px 14px 10px;
      background: var(--color-paper);
      border-top: 1px solid var(--hairline);
      text-align: center;
      font-size: 0.68rem;
      color: var(--color-ink-400);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .brand-footer strong {
      color: var(--color-brand);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="header-icon">AI</div>
    <div class="header-info">
      <h2>Spoznaj AI</h2>
      <p>Virtualni pomočnik · v živo</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages-container" id="msgs"></div>

  <div class="input-area">
    <div class="quick-actions" id="quickActions">
      <button class="quick-chip" data-p="Koliko stane virtualni pomočnik?">Cenik</button>
      <button class="quick-chip" data-p="Kako deluje pomočnik?">Kako deluje</button>
      <button class="quick-chip" data-p="Kako poteka postavitev?">Postavitev</button>
      <button class="quick-chip" data-p="Za katere panoge je primeren?">Primeri</button>
      <button class="quick-chip" data-p="Kako vas kontaktiram?">Kontakt</button>
    </div>
    <div class="input-wrapper">
      <textarea class="input-field" id="inp" rows="1" placeholder="Vprašajte nas..."></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Pošlji">→</button>
    </div>
  </div>

  <div class="brand-footer">
    <strong>Spoznaj AI</strong>
  </div>

  <script>
    const API_STREAM = (window.CHATBOT_API_URL || '') + '/chat/stream';
    const sessionId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
    const msgs = document.getElementById('msgs');
    const inp = document.getElementById('inp');
    const sendBtn = document.getElementById('sendBtn');

    function fmt(t) {
      return t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    }

    function addMsg(text, type) {
      const wrap = document.createElement('div');
      wrap.className = `message ${type}`;
      const av = document.createElement('div');
      av.className = 'message-avatar';
      av.textContent = type === 'bot' ? 'AI' : 'Vi';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = fmt(text);
      wrap.appendChild(av);
      wrap.appendChild(bubble);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'message bot'; wrap.id = 'typing';
      const av = document.createElement('div');
      av.className = 'message-avatar'; av.textContent = 'AI';
      const ind = document.createElement('div');
      ind.className = 'typing-indicator';
      ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      wrap.appendChild(av); wrap.appendChild(ind);
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function hideTyping() { document.getElementById('typing')?.remove(); }

    async function send(text) {
      const t = text.trim();
      if (!t) return;
      document.getElementById('quickActions').style.display = 'none';
      addMsg(t, 'user');
      inp.value = '';
      sendBtn.disabled = true;
      showTyping();
      try {
        const r = await fetch(API_STREAM, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: t, session_id: sessionId})
        });
        hideTyping();
        if (!r.ok) { addMsg('Napaka pri povezavi. Kontaktirajte nas: info@spoznaj-ai.si', 'bot'); return; }

        const wrap = document.createElement('div');
        wrap.className = 'message bot';
        const av = document.createElement('div');
        av.className = 'message-avatar'; av.textContent = 'AI';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        wrap.appendChild(av); wrap.appendChild(bubble);
        msgs.appendChild(wrap);

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          bubble.innerHTML = fmt(full);
          msgs.scrollTop = msgs.scrollHeight;
        }
        if (!full.trim()) bubble.textContent = 'Ni odgovora.';
      } catch {
        hideTyping();
        addMsg('Napaka pri povezavi. Kontaktirajte nas: info@spoznaj-ai.si', 'bot');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', () => send(inp.value));
    inp.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(inp.value);} });
    document.querySelectorAll('.quick-chip').forEach(c => c.addEventListener('click', () => send(c.dataset.p)));

    msgs.innerHTML = `<div class="welcome-box">
      <span class="eyebrow">Spoznaj AI</span>
      <h3>Dobrodošli na <em>Spoznaj AI</em></h3>
      <p>Sem virtualni pomočnik. Vprašajte me karkoli o naših storitvah, ceniku ali postavitvi.</p>
    </div>`;
  </script>
</body>
</html>
